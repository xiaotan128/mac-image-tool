name: Build macOS app

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build app
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name "框选导出_2MB版本" \
            "框选导出_2MB版本_mac.py"

      - name: Zip app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "框选导出_2MB版本.app" "框选导出_2MB版本_macOS.zip"

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: 框选导出_2MB版本_macOS
          path: dist/框选导出_2MB版本_macOS.zip
